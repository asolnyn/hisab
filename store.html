<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hisab Khata</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top">
    <div class="eyebrow">Asol Publication · Ledger</div>
    <h1 id="store-name">…</h1>
  </header>

  <main>
    <a class="back-link" href="index.html">← all stores</a>

    <div class="stamp">
      <div class="label">Balance</div>
      <div class="amount" id="stamp-amount">…</div>
    </div>

    <div id="content">
      <div class="status-msg">Loading ledger…</div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    async function loadStore() {
      const params = new URLSearchParams(location.search);
      const key = params.get('key');
      let fileId = params.get('file');
      let tabName = params.get('tab');
      const contentEl = document.getElementById('content');
      const nameEl = document.getElementById('store-name');
      const stampEl = document.getElementById('stamp-amount');

      // If a share token is present, resolve it to the real file+tab.
      // This is the only path meant to be shared with other people —
      // it reveals nothing about any other sheet or tab.
      if (key) {
        let links;
        try {
          links = await fetchJSON('config/links.json');
        } catch (e) {
          contentEl.innerHTML = '<div class="status-msg error">Could not load link data.</div>';
          return;
        }
        const entry = links[key];
        if (!entry) {
          contentEl.innerHTML = '<div class="status-msg error">This link is invalid or has expired.</div>';
          return;
        }
        fileId = entry.file;
        tabName = entry.tab;
      }

      let sheet;
      try {
        sheet = await fetchJSON(`config/${fileId}.json`);
      } catch (e) {
        contentEl.innerHTML = `<div class="status-msg error">Could not load config/${fileId}.json</div>`;
        return;
      }

      const tabInfo = sheet.tabs.find(t => t.tab === tabName);
      if (!tabInfo) {
        contentEl.innerHTML = '<div class="status-msg error">Tab not found in this sheet\'s config.</div>';
        return;
      }

      nameEl.textContent = `${sheet.title} — ${tabInfo.label}`;
      document.title = sheet.title + ' · Hisab Khata';

      try {
        const rows = await fetchSheet(sheet.sheetId, tabInfo.tab);
        const txns = parseTransactions(rows);

        let running = 0;
        const withRunning = txns.map(t => {
          running += t.amount;
          return { ...t, running };
        });

        stampEl.textContent = formatMoney(running);
        stampEl.classList.add(running < 0 ? 'debit' : 'credit');

        if (withRunning.length === 0) {
          contentEl.innerHTML = '<div class="status-msg">No transactions yet.</div>';
          return;
        }

        const rowsHtml = withRunning.slice().reverse().map(t => `
          <tr>
            <td class="amt ${t.amount < 0 ? 'debit' : 'credit'}">${formatMoney(t.amount)}</td>
            <td class="date-cell">${t.date}</td>
            <td class="note-cell">${t.note}</td>
            <td class="running">${formatMoney(t.running)}</td>
          </tr>
        `).join('');

        contentEl.innerHTML = `
          <table class="ledger">
            <thead>
              <tr><th>Amount</th><th>Date</th><th>Note</th><th>Balance</th></tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        `;
      } catch (e) {
        contentEl.innerHTML = `<div class="status-msg error">${e.message}</div>`;
      }
    }
    loadStore();
  </script>
</body>
</html>
