<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hisab Khata</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top">
    <div class="eyebrow">Asol Publication · Ledger</div>
    <h1><span class="bn">হিসাব</span> Khata</h1>
  </header>

  <main>
    <div id="list" class="store-list">
      <div class="status-msg">Loading stores…</div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    async function loadIndex() {
      const listEl = document.getElementById('list');
      let sheets, links;
      try {
        sheets = await loadAllSheetConfigs();
        links = await fetchJSON('config/links.json');
      } catch (e) {
        listEl.innerHTML = `<div class="status-msg error">${e.message}</div>`;
        return;
      }

      // reverse map: "file|||tab" -> token
      const tokenFor = {};
      for (const [token, entry] of Object.entries(links)) {
        tokenFor[entry.file + '|||' + entry.tab] = token;
      }

      listEl.innerHTML = '';
      for (const sheet of sheets) {
        const card = document.createElement('div');
        card.className = 'sheet-card';

        const titleEl = document.createElement('div');
        titleEl.className = 'title';
        titleEl.textContent = sheet.title;
        card.appendChild(titleEl);

        for (const t of sheet.tabs) {
          const token = tokenFor[sheet.id + '|||' + t.tab];
          const href = token
            ? `store.html?key=${token}`
            : `store.html?file=${encodeURIComponent(sheet.id)}&tab=${encodeURIComponent(t.tab)}`;

          const row = document.createElement('a');
          row.className = 'tab-row';
          row.href = href;
          row.innerHTML = `
            <span class="tab-label">tab: ${t.label}</span>
            <span class="tab-bal" data-tab="${t.tab}">…</span>
          `;
          card.appendChild(row);

          fetchSheet(sheet.sheetId, t.tab)
            .then(parseTransactions)
            .then(txns => {
              const total = txns.reduce((s, x) => s + x.amount, 0);
              const balEl = row.querySelector('.tab-bal');
              balEl.textContent = formatMoney(total);
              balEl.classList.add(total < 0 ? 'debit' : 'credit');
            })
            .catch(() => {
              row.querySelector('.tab-bal').textContent = '—';
            });
        }

        listEl.appendChild(card);
      }
    }
    loadIndex();
  </script>
</body>
</html>
